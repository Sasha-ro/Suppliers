<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Suppliers UI</title>
    <style>
      body{font-family:system-ui,Arial;margin:20px}
      .row{display:flex;gap:20px}
      .box{flex:1;padding:12px;border:1px solid #ddd;border-radius:6px}
      ul{padding-left:20px}
      button{margin:4px}
    </style>
  </head>
  <body>
    <h2>Suppliers & Products</h2>
    <div class="row">
      <div class="box">
        <h3>Suppliers</h3>
        <ul id="suppliers"></ul>
        <input id="newSupplierName" placeholder="Supplier name" />
        <button id="createSupplier">Create Supplier</button>
      </div>
      <div class="box">
        <h3>Products (for selected supplier)</h3>
        <div id="selectedSupplier">None</div>
        <ul id="products"></ul>
        <input id="newProductName" placeholder="Product name" />
        <input id="newProductPrice" placeholder="Price" type="number" step="0.01" />
        <button id="createProduct">Create Product</button>
      </div>
    </div>

    <script src="/app/main.js"></script>
  </body>
</html>
